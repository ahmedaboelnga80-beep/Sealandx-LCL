name: sealandx_lcl
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.12.0+1
  image_picker: ^1.2.3
  share_plus: ^13.2.0
  path_provider: ^2.1.6
  archive: ^4.0.9
  path: ^1.9.1
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  http: ^1.6.0
  firebase_core: ^3.12.0
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/
    - assets/templates/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
