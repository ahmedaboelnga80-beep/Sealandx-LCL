workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build iOS IPA (Unsigned / Standard)
        script: |
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
